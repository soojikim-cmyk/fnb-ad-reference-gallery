name: Update gallery

# 매일 오전 11시(KST) + 수동 실행. 신규 광고 수집 → 비전 태깅 → 갤러리 재생성 → 커밋·푸시.
# 클라우드에서 도므로 컴퓨터가 꺼져 있어도 자동 실행됩니다(Meta 광고 한정).
# main 의 docs/ 가 갱신되면 GitHub Pages 가 자동 재배포됩니다.
on:
  schedule:
    - cron: '0 2 * * *'   # 매일 02:00 UTC (= 11:00 KST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gallery
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # 참고: Facebook 광고 라이브러리는 데이터센터 IP(GitHub Actions)를 차단할 수 있습니다.
    # 수집이 0건/에러로 막히면 'runs-on: self-hosted' 로 바꿔 사내(또는 개인) 머신 러너에서 돌리세요.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Collect new ads
        run: node collect.js

      - name: Vision-tag new ads (Claude Code · Max plan)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        # 도구를 Read/Write/Glob 로만 스코프 — 승인 게이트 전체 우회 안 함.
        # 태깅은 신규분만 data/new_tags.json 에 Write (큰 tags.json 직접 Edit 시 권한 게이트에 막혀 태그 유실되던 문제 회피).
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "$(cat tag-prompt.md)" --allowedTools "Read,Write,Glob" --max-turns 200

      - name: Merge new tags into tags.json
        run: node merge-tags.js

      - name: Merge into gallery DB
        run: node collect.js --commit

      - name: Render gallery
        run: node render.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs                         # 산출물만 — 태깅이 만든 루트 임시 스크립트 제외
          git diff --cached --quiet && { echo "변경 없음"; exit 0; }
          git commit -m "Weekly gallery update"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then echo "푸시 완료"; exit 0; fi
            git rebase --abort 2>/dev/null || true
            echo "원격 갱신/충돌 — 재시도 $i"; sleep 5
          done
          echo "푸시 실패(재시도 소진)"; exit 1
