name: Update gallery

# 매주 월요일 + 수동 실행. 신규 광고 수집 → 비전 태깅 → 갤러리 재생성 → 커밋·푸시.
# main 의 docs/ 가 갱신되면 GitHub Pages 가 자동 재배포됩니다.
on:
  schedule:
    - cron: '0 0 * * 1'   # Mon 00:00 UTC (= 09:00 KST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gallery
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # 참고: Facebook 광고 라이브러리는 데이터센터 IP(GitHub Actions)를 차단할 수 있습니다.
    # 수집이 0건/에러로 막히면 'runs-on: self-hosted' 로 바꿔 사내(또는 개인) 머신 러너에서 돌리세요.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Collect new ads
        run: node collect.js

      - name: Vision-tag new ads
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 비용 절감 시: TAG_MODEL: claude-haiku-4-5
        run: node tag.js

      - name: Merge into gallery DB
        run: node collect.js --commit

      - name: Render gallery
        run: node render.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Weekly gallery update"
          git push
